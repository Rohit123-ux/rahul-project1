{% extends 'base.html' %}
{% block title %}Login — HealthGuard{% endblock %}
{% block content %}
<style>
.auth-wrap{max-width:420px;margin:60px auto;}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo h1{font-family:'DM Serif Display',serif;font-size:28px;}
.auth-logo p{color:var(--muted);font-size:13px;margin-top:6px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;}
.auth-card h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.auth-card p{font-size:13px;color:var(--muted);margin-bottom:24px;}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}
</style>

<div class="auth-wrap">
  <div class="auth-logo">
    <h1>🛡️ HealthGuard</h1>
    <p>Multi Disease Risk Assessment System</p>
  </div>
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Login to access your health dashboard</p>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
        Login →
      </button>
    </form>
    <div class="divider">or</div>
    <a href="/register" class="btn btn-outline btn-full">Create New Account</a>
  </div>
</div>
{% endblock %}
